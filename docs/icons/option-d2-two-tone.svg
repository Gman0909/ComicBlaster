<!--
  D2 — Two-tone blue with pale inner pages.
  Outer covers in mid-blue, inner page strip a near-white so the book
  reads as "open" at small sizes (D1's page outlines blur away below
  about 32 px). Yellow bolt unchanged.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#0f1733"/>
  <!-- Outer covers -->
  <g fill="#3a4cc7" stroke="#5d72ff" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <path d="M50 130
             C 50 130, 170 110, 256 170
             L 256 420
             C 170 360, 50 380, 50 380 Z"/>
    <path d="M462 130
             C 462 130, 342 110, 256 170
             L 256 420
             C 342 360, 462 380, 462 380 Z"/>
  </g>
  <!-- Inner page strip, sitting just inside the cover edges -->
  <g fill="#e6ecff">
    <path d="M82 162
             C 82 162, 180 145, 256 195
             L 256 408
             C 180 358, 82 372, 82 372 Z"/>
    <path d="M430 162
             C 430 162, 332 145, 256 195
             L 256 408
             C 332 358, 430 372, 430 372 Z"/>
  </g>
  <!-- Spine + page-line detail -->
  <line x1="256" y1="195" x2="256" y2="408" stroke="#3a4cc7" stroke-width="8" stroke-linecap="round"/>
  <polygon points="280,90 200,260 254,260 220,400 320,210 264,210 296,90"
           fill="#ffd24a" stroke="#a06e00" stroke-width="6" stroke-linejoin="round"/>
</svg>
